name: Build AionUi GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/butterfly-coders/aionui

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}

      - name: Export image tar
        shell: bash
        run: |
          docker pull ${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}
          docker save -o aionui-v${{ steps.version.outputs.version }}-amd64.tar ${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: aionui-image-amd64-v${{ steps.version.outputs.version }}
          path: aionui-v${{ steps.version.outputs.version }}-amd64.tar
          retention-days: 7

      - name: Print digest
        shell: bash
        run: |
          echo "latest -> ${{ env.IMAGE_NAME }}:latest"
          echo "version -> ${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.version }}"
          echo "digest -> ${{ steps.build.outputs.digest }}"